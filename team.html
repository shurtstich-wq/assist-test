<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-45CZGQCL2F"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-45CZGQCL2F');</script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Team — ASSIST Community Design Center</title>
  <style>
    .team-card--static { cursor: default; }
    main { max-width: 1440px; margin: 0 auto; padding: 48px 72px 80px; }
    .section-label { font-size: 16px; font-weight: 700; color: var(--charcoal); margin-bottom: 12px; }
    .section-divider { height: 1px; background: var(--assist-blue); width: 100%; margin-bottom: 32px; }
    .team-section { display: flex; flex-direction: column; }
    .card-row { display: grid; grid-template-columns: repeat(var(--cols, 4), 1fr); gap: 32px; margin-bottom: 32px; }
    .team-card { cursor: pointer; }
    .team-card-photo { width: 100%; aspect-ratio: 2/3; border-radius: 6px; background: var(--clay); overflow: hidden; transition: transform 0.25s ease, box-shadow 0.25s ease; }
    .team-card-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .team-card:hover .team-card-photo { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(40,81,96,0.15); }
    .team-card.active .team-card-photo { box-shadow: 0 0 0 3px var(--assist-blue); transform: translateY(-2px); }
    .team-card-name { font-size: 22px; font-weight: 500; line-height: 30px; letter-spacing: -0.2px; color: var(--charcoal); margin-top: 14px; }
    .team-card-title { font-size: 13px; font-weight: 500; color: var(--bark); margin-top: 4px; line-height: 18px; }
    .detail-panel { display: none; background: var(--sand); border-radius: 8px; padding: 48px; margin-bottom: 32px; position: relative; animation: slideDown 0.3s ease; }
    .detail-panel.visible { display: flex; gap: 48px; align-items: flex-start; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .detail-photo { width: 280px; min-width: 280px; aspect-ratio: 2/3; border-radius: 6px; background: var(--clay); overflow: hidden; flex-shrink: 0; }
    .detail-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .detail-content { flex: 1; padding-top: 4px; }
    .detail-name { font-size: 42px; font-weight: 700; line-height: 52px; letter-spacing: -1px; color: var(--graphite); margin-bottom: 10px; }
    .detail-title { font-size: 13px; font-weight: 600; color: var(--bark); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 20px; }
    .detail-bio { font-size: 16px; font-weight: 400; line-height: 26px; letter-spacing: 0.3px; color: var(--graphite); }
    .detail-bio p + p { margin-top: 14px; }
    .detail-close { position: absolute; top: 16px; right: 16px; width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--clay); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--graphite); transition: background 0.2s; z-index: 10; }
    .detail-close:hover { background: var(--bark); color: white; }
    .advisory-section { margin-top: 56px; }
    @media (max-width: 1024px) {
      main { padding: 40px 40px 60px; }
      .card-row { --cols: 3; gap: 24px; }
      .detail-name { font-size: 32px; line-height: 40px; }
      .detail-photo { width: 220px; min-width: 220px; }
    }
    @media (max-width: 768px) {
      main { padding: 32px 20px 48px; }
      .card-row { --cols: 2; gap: 16px; margin-bottom: 16px; }
      .team-card-name { font-size: 15px; line-height: 20px; margin-top: 10px; }
      .team-card-title { font-size: 12px; }
      .detail-panel.visible { flex-direction: column; padding: 20px; gap: 20px; }
      .detail-close { display: none; }
      .detail-photo { width: 100%; min-width: unset; aspect-ratio: 2/3; }
      .detail-name { font-size: 26px; line-height: 34px; }
      .detail-bio { font-size: 15px; line-height: 24px; }
      .detail-panel { margin-bottom: 16px; }
      .advisory-section { margin-top: 36px; }
    }
    @media (max-width: 480px) {
      .card-row { gap: 12px; }
      .detail-panel.visible { padding: 20px; }
      .detail-name { font-size: 22px; line-height: 28px; }
      .detail-title { font-size: 11px; }
    }
    .team-card--static { cursor: default; }
    .team-card--static:hover .team-card-photo { transform: none; box-shadow: none; }
    .team-card--static .team-card-photo { aspect-ratio: 1/1; }
  </style>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>
<script src="shared.js"></script>
<script src="content.js"></script>
<script>renderNav('Team');</script>

  <main>
    <p class="section-label">Our Team</p>
    <div class="section-divider"></div>
    <div class="team-section" id="teamSection"></div>

    <div class="advisory-section">
      <p class="section-label">Our Advisory Board</p>
      <div class="section-divider"></div>
      <div class="team-section" id="advisorySection"></div>
    </div>
  </main>

  <script>
    const staffMembers = [
      { id: 'jason', name: 'Jason Wheeler, AIA', title: 'Executive Director',
        tilePhoto: 'https://drive.google.com/thumbnail?id=1azzqlRnuMJBVAUA1MwVFA8rQwEiD-vQk&sz=w1200', detailPhoto: 'https://drive.google.com/thumbnail?id=1sIa6rlmSaddZwH2zNNwK2w5zfhixv4yx&sz=w1200',
        bio: `<p>Jason Wheeler has been Executive Director of ASSIST Inc since 2016. While at ASSIST, Jason has served as architect for hundreds of units of new and rehabbed multi-family and single-family housing throughout Utah and Arizona and managed 15+ million dollars of federal grant funding.</p><p>Prior to joining ASSIST, Jason worked as an architect at Alley Poyner Macchietto Architecture in Omaha, Nebraska and as an Enterprise Rose Architectural Fellow at Color Country Community Housing in St. George, Utah.</p><p>Jason holds an M.Arch. from the University of Illinois at Urbana Champaign and a B.S. in Construction Management from BYU. He is a licensed architect in Utah and Arizona.</p>` },
      { id: 'jennifer', name: 'Jennifer Schreiter', title: 'Office Manager',
        tilePhoto: 'https://drive.google.com/thumbnail?id=1jr48uUNtrOenh-hQL8_qNk0RUWEjqg6t&sz=w1200', detailPhoto: 'https://drive.google.com/thumbnail?id=1hZPL_HyO-f96VVFgZDQPpBa9mEzTMfJI&sz=w1200',
        bio: `<p>Jennifer Schreiter has been helping nonprofits succeed since 2001. Holding degrees in Business Management and Accounting, she has served nonprofits to help with board management, event planning, and fundraising. Jennifer has been at Assist since 2017 as the Office Manager and keeps things humming.</p>` },
      { id: 'sam', name: 'Sam Ball, AIA', title: 'Community Design Director',
        tilePhoto: 'https://drive.google.com/thumbnail?id=1XXy3OYffW9sPK-xIuZHwT-2n3UzSyOwI&sz=w1200', detailPhoto: 'https://drive.google.com/thumbnail?id=1cb4lCaGMTLTS1c7R5FbiLmdkm411nfID&sz=w1200',
        bio: `<p>Sam Ball joined ASSIST in January 2021, bringing with him extensive experience in both the architecture and construction industries. Sam is passionate about using design to improve communities in Utah. Sam is a licensed architect in Utah and holds an M.Arch. from the University of Utah.</p>` },
      { id: 'andres', name: 'Andrés Calderón', title: 'Emergency Home Repair Program Director',
        tilePhoto: 'https://drive.google.com/thumbnail?id=18mvctoSzKCQey-J7H4koMmWnf05LDtS-&sz=w1200', detailPhoto: 'https://drive.google.com/thumbnail?id=1qy-Cr-E_ybCbZlurER_59bGiarracBtr&sz=w1200',
        bio: `<p>Andrés is a passionate social worker with over 20 years of experience in the field. Before arriving at ASSIST, he recently worked for Utah Community Action and YWCA Utah. Andrés is a native of Salt Lake City, Utah, and speaks fluent Spanish.</p>` },
      { id: 'soudabeh', name: 'Soudabeh Sabouri', title: 'Design Associate',
        tilePhoto: 'https://drive.google.com/thumbnail?id=1qriimhfx2eODoknUc_ysfE9FrVLdBy8C&sz=w1200', detailPhoto: 'https://drive.google.com/thumbnail?id=1hlcU_DmOLwx3ZrEg_mSq6m_GwO_NzJXr&sz=w1200',
        bio: `<p>Soudabeh Sabouri joined ASSIST in September 2022 as a designer focused on expanding ASSIST's community design efforts. Soudabeh has a passion for affordable housing and uses her design work to provide better housing solutions for low-income or previously homeless individuals.</p>` },
      { id: 'zizheng', name: 'Zizheng Cao', title: 'Design Associate',
        tilePhoto: 'https://drive.google.com/thumbnail?id=1qVv9Oz87BHmf-aI-qYzwwEsehDCedEVQ&sz=w1200', detailPhoto: 'https://drive.google.com/thumbnail?id=1fEEx7FEqAtvzQ8a_OO-EXq6sJAYD5akj&sz=w1200',
        bio: `<p>Zizheng Cao joined ASSIST in 2020, bringing a strong commitment to improving the living conditions of seniors and individuals with disabilities through accessible design.</p>` },
      { id: 'georgia', name: 'Georgia Alley', title: 'Design Associate',
        tilePhoto: 'https://drive.google.com/thumbnail?id=1LWnFIuelvIhxh5SOvaaqR8T-BqQDJoiH&sz=w1200', detailPhoto: 'https://drive.google.com/thumbnail?id=1kxzk-Qv4-Fzb3w_3zzCtNcf_jEoxY-we&sz=w1200',
        bio: `<p>Georgia is a recent graduate of Architecture and is a fantastic addition to our team. More coming soon…</p>` },
      { id: 'baylie', name: 'Baylie McKinney', title: 'Intern',
        tilePhoto: 'https://drive.google.com/thumbnail?id=1SAMhaEou9now0rIepQcYgNA_kLNMPm2j&sz=w1200', detailPhoto: 'https://drive.google.com/thumbnail?id=1ItPw3WrtRG2B0EUHUj-tqVvwogEjhDFb&sz=w1200',
        bio: `<p>Baylie McKinney is an excellent intern. We will share more about her very soon…</p>` },
      { id: 'ben', name: 'Ben Keddington', title: 'Team Member',
        tilePhoto: 'https://drive.google.com/thumbnail?id=1slo3QzIpdAlP40I0dEf6Dk4HNNdWc53z&sz=w1200', detailPhoto: 'https://drive.google.com/thumbnail?id=1_Wzad4Ei7QDOQ7UbsAZHnZOyIwyUK0g_&sz=w1200',
        bio: `<p>Ben has been a great addition to the team. We will share more about him very soon…</p>` },
      { id: 'sara', name: 'Sara Anderson', title: 'Team Member',
        tilePhoto: 'https://drive.google.com/thumbnail?id=1xZez_AEFv6AnaR6mBevfQ5nhlHYbksjL&sz=w1200', detailPhoto: 'https://drive.google.com/thumbnail?id=1etSDOmbHAqYbCO-f-tKsl6489ow9A8wy&sz=w1200',
        bio: `<p>Sara has been a great addition to the team. We will share more about her very soon…</p>` }
    ];

    const boardMembers = [
      { id: 'valerie', name: 'Valerie Greer', title: 'President',
        tilePhoto: 'placeholder.svg', detailPhoto: 'placeholder.svg',
        bio: `<p>President on the ASSIST Advisory Board.</p>` },
      { id: 'vance', name: 'Vance Siebers', title: 'President-Elect',
        tilePhoto: 'placeholder.svg', detailPhoto: 'placeholder.svg',
        bio: `<p>President-Elect on the ASSIST Advisory Board.</p>` },
      { id: 'nishat', name: 'Nishat Jahan Itu Miaji', title: 'Secretary / Student Board Member',
        tilePhoto: 'placeholder.svg', detailPhoto: 'placeholder.svg',
        bio: `<p>Secretary / Student Board Member on the ASSIST Advisory Board.</p>` },
      { id: 'sophie', name: 'Sophie Bellina', title: 'Treasurer',
        tilePhoto: 'placeholder.svg', detailPhoto: 'placeholder.svg',
        bio: `<p>Treasurer on the ASSIST Advisory Board.</p>` },
      { id: 'brian', name: 'Brian Cook', title: 'Board Member',
        tilePhoto: 'placeholder.svg', detailPhoto: 'placeholder.svg',
        bio: `<p>Brian Cook serves as a Board Member of the ASSIST Board of Directors.</p>` }
    ];

    const allMembers = [...staffMembers, ...boardMembers];

    function getCols() {
      if (window.innerWidth <= 768) return 2;
      if (window.innerWidth <= 1024) return 3;
      return 4;
    }

    function buildSection(members, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      const cols = getCols();
      for (let i = 0; i < members.length; i += cols) {
        const rowMembers = members.slice(i, i + cols);
        const rowIdx = Math.floor(i / cols);
        const row = document.createElement('div');
        row.className = 'card-row';
        row.dataset.row = rowIdx;
        rowMembers.forEach(m => {
          const card = document.createElement('div');
          card.className = 'team-card';
          card.id = `card-${containerId}-${m.id}`;
          card.setAttribute('onclick', `toggleDetail('${m.id}','${containerId}')`);
          card.innerHTML = `
            <div class="team-card-photo">
              <img src="${m.tilePhoto || m.detailPhoto || 'placeholder.svg'}" alt="${m.name}" loading="lazy" />
            </div>
            <p class="team-card-name">${m.name}</p>
            <p class="team-card-title">${m.title}</p>`;
          row.appendChild(card);
        });
        container.appendChild(row);
        const panel = document.createElement('div');
        panel.className = 'detail-panel';
        panel.id = `panel-${containerId}-${rowIdx}`;
        panel.innerHTML = `
          <button class="detail-close" onclick="closeSection('${containerId}')" aria-label="Close">✕</button>
          <div class="detail-photo"><img id="dphoto-${containerId}-${rowIdx}" src="" alt="" /></div>
          <div class="detail-content">
            <h3 class="detail-name" id="dname-${containerId}-${rowIdx}"></h3>
            <p class="detail-title" id="dtitle-${containerId}-${rowIdx}"></p>
            <div class="detail-bio" id="dbio-${containerId}-${rowIdx}"></div>
          </div>`;
        container.appendChild(panel);
      }
    }

    function buildStaticSection(members, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      const cols = getCols();
      for (let i = 0; i < members.length; i += cols) {
        const rowMembers = members.slice(i, i + cols);
        const row = document.createElement('div');
        row.className = 'card-row';
        rowMembers.forEach(m => {
          const card = document.createElement('div');
          card.className = 'team-card team-card--static';
          card.innerHTML = `
            <div class="team-card-photo">
              <img src="${m.tilePhoto || m.detailPhoto || 'placeholder.svg'}" alt="${m.name}" loading="lazy" />
            </div>
            <p class="team-card-name">${m.name}</p>
            <p class="team-card-title">${m.title}</p>`;
          row.appendChild(card);
        });
        container.appendChild(row);
      }
    }

    const active = { teamSection: null, advisorySection: null };

    function toggleDetail(memberId, containerId) {
      if (active[containerId] === memberId) { closeSection(containerId); return; }
      closeSection(containerId, false);
      const member = allMembers.find(m => m.id === memberId);
      const members = containerId === 'teamSection' ? staffMembers : boardMembers;
      const idx = members.findIndex(m => m.id === memberId);
      const cols = getCols();
      const rowIdx = Math.floor(idx / cols);
      active[containerId] = memberId;
      document.getElementById(`card-${containerId}-${memberId}`).classList.add('active');
      const p = rowIdx;
      document.getElementById(`dphoto-${containerId}-${p}`).src = member.detailPhoto || member.tilePhoto || 'placeholder.svg';
      document.getElementById(`dphoto-${containerId}-${p}`).alt = member.name;
      document.getElementById(`dname-${containerId}-${p}`).textContent = member.name;
      document.getElementById(`dtitle-${containerId}-${p}`).textContent = member.title;
      document.getElementById(`dbio-${containerId}-${p}`).innerHTML = member.bio;
      const panel = document.getElementById(`panel-${containerId}-${rowIdx}`);
      panel.classList.add('visible');
      setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
    }

    function closeSection(containerId, clearState = true) {
      document.querySelectorAll(`#${containerId} .detail-panel`).forEach(p => p.classList.remove('visible'));
      document.querySelectorAll(`#${containerId} .team-card`).forEach(c => c.classList.remove('active'));
      if (clearState) active[containerId] = null;
    }

    let lastCols = getCols();
    window.addEventListener('resize', () => {
      const c = getCols();
      if (c !== lastCols) {
        lastCols = c;
        active.teamSection = null;
        buildSection(staffMembers, 'teamSection');
        buildStaticSection(boardMembers, 'advisorySection');
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeSection('teamSection'); closeSection('advisorySection'); }
    });

    buildSection(staffMembers, 'teamSection');
    buildStaticSection(boardMembers, 'advisorySection');
  </script>

<script>renderFooter(); renderFooterContent();</script>
</body>
</html>
